  <div class="container">
    <div class="breadcrumbs">
      <a href="index.html">Home</a>
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      <span>Image Generator</span>
    </div>
  </div>

  <section class="section" style="padding: 1rem 0 2rem;">
    <div class="container">
      <div class="tool-panel">
        <form id="generateForm">
        <div class="form-group">
          <label for="prompt">Description</label>
          <textarea id="prompt" placeholder="A futuristic city with neon lights, cyberpunk style, highly detailed..." rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="negativePrompt">Negative Prompt</label>
          <input id="negativePrompt" type="text" placeholder="things to exclude..." />
        </div>
        <div class="tool-options">
          <div class="form-group">
            <label for="model">Engine</label>
            <select id="model">
              <option>Phoenix — Photorealism</option>
              <option>SDXL — Universal</option>
              <option>DreamForge — Concept Art</option>
              <option>Flux — Fast</option>
              <option>AnimeXL — Anime Style</option>
              <option>WaifuStudio — Waifu Art</option>
              <option>VelvetRender — Artistic</option>
            </select>
          </div>
          <div class="form-group">
            <label for="ratio">Aspect ratio</label>
            <select id="ratio">
              <option>1:1 (Square)</option>
              <option>16:9 (Wide)</option>
              <option>9:16 (Portrait)</option>
              <option>3:2</option>
              <option>2:3</option>
              <option>4:3</option>
            </select>
          </div>
          <div class="form-group">
            <label for="quality">Quality</label>
            <select id="quality">
              <option>Standard</option>
              <option selected>HD</option>
              <option>Ultra HD</option>
            </select>
          </div>
          <div class="form-group">
            <label for="batch">Count</label>
            <select id="batch">
              <option>1 image</option>
              <option selected>2 images</option>
              <option>4 images</option>
              <option>6 images</option>
              <option>9 images</option>
            </select>
          </div>
        </div>
        <div class="tool-actions">
          <button type="submit" id="generateBtn" class="btn btn-primary btn-lg">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
            Generate
          </button>
          <span style="font-size: 0.75rem; color: var(--muted-foreground);">Free — 10 generations left today</span>
        </div>
      </form>
      </div>

      <h2 style="margin-bottom: 1rem;">Results</h2>
      <div id="resultsGrid" class="results-grid">
      </div>
      <div id="generationStatus" style="text-align: center; min-height: 2rem; margin-top: 0.5rem; color: var(--muted-foreground); font-size: 0.875rem;"></div>
    </div>
  </section>

  <footer>
