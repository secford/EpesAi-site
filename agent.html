  <div class="container">

      <a href="index.html">Home</a>

      <span>Chat</span>
    </div>
  </div>

  <section class="section" style="padding: 1rem 0 3rem;">
    <div class="container">
      <div class="tool-panel" style="display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; padding: 0.75rem 1.5rem; margin-bottom: 1rem;">
        <label for="chat-model" style="font-size: 0.875rem; font-weight: 500;">Model:</label>
        <select id="chat-model" style="padding: 0.375rem 0.5rem; border: 1px solid var(--border); border-radius: calc(var(--radius) - 2px); background: var(--background); color: var(--foreground); font-size: 0.875rem;">
          <option>Standard</option>
          <option>Advanced</option>
          <option>Reasoning</option>
          <option>Vision</option>
        </select>
        <span style="font-size: 0.75rem; color: var(--muted-foreground); margin-left: auto;">Free — 20 messages left today</span>
      </div>

      <div class="chat-interface">
        <div class="chat-messages"></div>
        <div class="chat-input-area">
          <input type="text" placeholder="Type your message..." id="chat-input">
          <button class="btn btn-primary" id="send-btn">Send</button>
        </div>
      </div>
    </div>
  </section>

  <footer>

      <div class="col">
